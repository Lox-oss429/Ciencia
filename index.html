<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Mis archivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        .hidden { display: none !important; }
        iframe { border: none; width: 100%; height: 100vh; background: black; }
        #secret-input { position: absolute; top: -100px; opacity: 0; }
        .btn-game { @apply bg-gray-800 hover:bg-gray-700 text-white p-4 rounded-xl flex flex-col items-center justify-center border-b-4 border-black active:border-b-0; }
    </style>
</head>
<body class="flex items-center justify-center">

    <input type="text" id="secret-input" autocomplete="off">

    <div id="calculator" onclick="document.getElementById('secret-input').focus()" class="bg-white p-8 rounded-lg shadow-xl w-80 border-t-4 border-green-600">
        <h2 class="text-2xl font-bold text-green-600 mb-4 text-center">Laboratorio de Química</h2>
        <p class="text-xs text-gray-500 mb-4 text-center">Masa Atómica / Isótopos</p>
        <div class="space-y-2">
            <input type="number" placeholder="Masa" class="w-full p-2 border rounded text-sm">
            <input type="number" placeholder="Abundancia %" class="w-full p-2 border rounded text-sm">
            <button class="w-full bg-green-600 text-white py-2 rounded font-bold">Procesar</button>
        </div>
    </div>

    <div id="main-menu" class="hidden bg-gray-900 p-6 rounded-2xl shadow-2xl w-full max-w-2xl text-white">
        <h1 class="text-2xl font-black text-orange-500 mb-6 text-center">CENTRAL DE JUEGOS 🦊</h1>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <button onclick="load('https://api.retrogames.cc/embed/40238-pokemon-edicion-rojo-fuego-spain.html')" class="btn-game"><span>🔴 Pokémon RF</span></button>
            
            <button onclick="load('https://api.retrogames.cc/embed/40212-pokemon-edicion-esmeralda-spain.html')" class="btn-game"><span>💚 Pokémon ESM</span></button>
            
            <button onclick="load('https://games.eaglercraft.com/')" class="btn-game"><span>⛏️ Minecraft</span></button>
            
            <button onclick="load('https://n-adeel.github.io/super-mario-bros/')" class="btn-game"><span>🍄 Super Mario</span></button>
            
            <button onclick="load('https://www.retrogames.cc/psx-games.html')" class="btn-game"><span>💿 Juegos PS1</span></button>
            
            <button onclick="location.reload()" class="bg-red-600 p-4 rounded-xl font-bold">❌ SALIR</button>
        </div>
    </div>

    <div id="game-view" class="hidden w-full h-full">
        <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const secretInput = document.getElementById('secret-input');
        const calc = document.getElementById('calculator');
        const menu = document.getElementById('main-menu');
        const view = document.getElementById('game-view');
        const frame = document.getElementById('game-frame');

        secretInput.addEventListener('input', (e) => {
            if (e.target.value.toLowerCase().includes('fox')) {
                calc.classList.add('hidden');
                menu.classList.remove('hidden');
                e.target.value = "";
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'q') location.reload();
        });

        function load(url) {
            menu.classList.add('hidden');
            view.classList.remove('hidden');
            frame.src = url;
        }
    </script>
</body>
</html>
