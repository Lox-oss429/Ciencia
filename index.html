<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Masa Atómica - Ciencias</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; border-top: 6px solid #28a745; }
        h2 { color: #28a745; margin-bottom: 10px; }
        input { width: 85%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* VENTANA DE JUEGOS */
        #game-win { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        iframe { width: 100%; height: calc(100% - 40px); border: none; }
        .nav { background: #1a1a1a; padding: 5px; display: flex; gap: 10px; justify-content: center; }
        .nav button { width: auto; padding: 5px 15px; font-size: 12px; background: #333; }

        /* TRIGGER INVISIBLE */
        .secret-trigger { position: fixed; bottom: 0; right: 0; width: 15px; height: 15px; z-index: 10000; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Laboratorio de Química</h2>
        <p>Calcula el promedio de masa atómica:</p>
        <input type="number" placeholder="Masa (u)">
        <input type="number" placeholder="Abundancia (%)">
        <button onclick="alert('Datos guardados.')">Procesar</button>
    </div>

    <div class="secret-trigger" onclick="abrir()"></div>

    <div id="game-win">
        <div class="nav">
            <button onclick="play('poke')">Pokémon</button>
            <button onclick="play('mario')">Mario</button>
            <button onclick="play('mine')">Minecraft MP</button>
            <button onclick="cerrar()" style="background:#600">CERRAR</button>
        </div>
        <iframe src="" id="f"></iframe>
    </div>

    <script>
        const f = document.getElementById('f');
        const w = document.getElementById('game-win');

        function abrir() {
            w.style.display = 'block';
            document.title = "Google Drive"; 
            play('poke');
        }

        function play(j) {
            if(j === 'poke') f.src = "https://www.retrogames.cc/search.html?keyword=pokemon";
            if(j === 'mario') f.src = "https://www.retrogames.cc/search.html?keyword=mario";
            if(j === 'mine') f.src = "https://classic.minecraft.net/";
        }

        // EL CÓDIGO DE ESCAPE MAESTRO
        function cerrar() {
            w.style.display = 'none';
            f.src = ""; // Corta el sonido del juego al instante
            document.title = "Calculadora de Masa Atómica - Ciencias";
        }

        // ESCAPE CON TECLADO (Q o ESC)
        window.onkeydown = function(e) {
            // Si presionas ESC o la letra Q, se cierra todo
            if (e.key === "Escape" || e.key === "q" || e.key === "Q") {
                cerrar();
            }
        };

        // ESCAPE CON CLICK (Si haces click en la barra negra de arriba, se cierra)
        w.onclick = function(e) {
            if (e.target === w) cerrar();
        };
    </script>
</body>
</html>
