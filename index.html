<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Mis archivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', sans-serif; }
        .hidden { display: none !important; }
        #secret-input { position: absolute; top: -100px; opacity: 0; }
        .game-card { @apply bg-gray-800 rounded-xl overflow-hidden shadow-lg border border-gray-700 hover:scale-105 transition-all cursor-pointer; }
        iframe { border: none; width: 100%; height: 100vh; background: black; }
    </style>
</head>
<body class="flex items-center justify-center">

    <input type="text" id="secret-input" autocomplete="off">

    <div id="calculator" onclick="document.getElementById('secret-input').focus()" class="bg-white p-8 rounded-2xl shadow-2xl w-80 border-t-8 border-green-500">
        <h2 class="text-2xl font-black text-green-600 mb-2 text-center uppercase tracking-tighter">Innova Lab</h2>
        <p class="text-[10px] text-gray-400 mb-6 text-center font-mono">CALCULADORA DE ISÓTOPOS V4.0</p>
        <div class="space-y-3">
            <input type="number" placeholder="Masa Atómica (u)" class="w-full p-3 bg-gray-50 border rounded-lg text-sm outline-none focus:ring-2 ring-green-400">
            <input type="number" placeholder="Abundancia (%)" class="w-full p-3 bg-gray-50 border rounded-lg text-sm outline-none focus:ring-2 ring-green-400">
            <button class="w-full bg-green-500 text-white py-3 rounded-lg font-black shadow-lg">CALCULAR PROMEDIO</button>
        </div>
        <p class="text-[8px] text-gray-200 mt-6 text-right">ID: 028475-QN</p>
    </div>

    <div id="game-menu" class="hidden w-full max-w-4xl p-6 overflow-y-auto h-screen bg-slate-900">
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-600">CENTRAL GAMER 🦊</h1>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">CERRAR (Q)</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div onclick="load('https://api.retrogames.cc/embed/40238-pokemon-edicion-rojo-fuego-spain.html')" class="game-card">
                <div class="h-24 bg-red-600 flex items-center justify-center text-3xl">🔴</div>
                <div class="p-3 text-center text-white font-bold text-sm">Pokémon Rojo Fuego</div>
            </div>

            <div onclick="load('https://api.retrogames.cc/embed/40212-pokemon-edicion-esmeralda-spain.html')" class="game-card">
                <div class="h-24 bg-green-600 flex items-center justify-center text-3xl">💚</div>
                <div class="p-3 text-center text-white font-bold text-sm">Pokémon Esmeralda</div>
            </div>

            <div onclick="load('https://n-adeel.github.io/super-mario-bros/')" class="game-card">
                <div class="h-24 bg-blue-500 flex items-center justify-center text-3xl">🍄</div>
                <div class="p-3 text-center text-white font-bold text-sm">Super Mario Bros</div>
            </div>

            <div onclick="window.open('https://games.eaglercraft.com/', '_blank')" class="game-card">
                <div class="h-24 bg-emerald-800 flex items-center justify-center text-3xl">⛏️</div>
                <div class="p-3 text-center text-white font-bold text-sm">Minecraft (Web)</div>
            </div>

            <div onclick="window.open('https://www.retrogames.cc/psx-games.html', '_blank')" class="game-card">
                <div class="h-24 bg-gray-400 flex items-center justify-center text-3xl">💿</div>
                <div class="p-3 text-center text-white font-bold text-sm">Catálogo PS1</div>
            </div>

            <div onclick="window.open('https://www.retrogames.cc/nintendo-64-games.html', '_blank')" class="game-card">
                <div class="h-24 bg-purple-600 flex items-center justify-center text-3xl">🎮</div>
                <div class="p-3 text-center text-white font-bold text-sm">Nintendo 64</div>
            </div>
            
            <div onclick="window.open('https://vimm.net/?p=emulate', '_blank')" class="game-card border-orange-500">
                <div class="h-24 bg-orange-600 flex items-center justify-center text-3xl">🌟</div>
                <div class="p-3 text-center text-white font-bold text-sm">Más Consolas</div>
            </div>
        </div>
    </div>

    <div id="game-view" class="hidden w-full h-full bg-black">
        <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const secretInput = document.getElementById('secret-input');
        const calc = document.getElementById('calculator');
        const menu = document.getElementById('game-menu');
        const view = document.getElementById('game-view');
        const frame = document.getElementById('game-frame');

        // Detectar el código fox
        secretInput.addEventListener('input', (e) => {
            if (e.target.value.toLowerCase().includes('fox')) {
                calc.classList.add('hidden');
                menu.classList.remove('hidden');
                document.body.style.backgroundColor = "#0f172a";
                e.target.value = "";
            }
        });

        // Tecla Q para cerrar todo
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'q') location.reload();
        });

        function load(url) {
            menu.classList.add('hidden');
            view.classList.remove('hidden');
            frame.src = url;
        }
    </script>
</body>
</html>
