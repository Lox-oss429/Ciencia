<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Mis archivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div id="calculator" class="bg-white p-8 rounded-lg shadow-xl w-80 border-t-4 border-green-600">
        <h2 class="text-2xl font-bold text-green-600 mb-4 text-center">Laboratorio de Química</h2>
        <p class="text-xs text-gray-500 mb-4 text-center">Calcula el promedio de masa atómica:</p>
        <input type="number" placeholder="Masa (u)" class="w-full p-2 mb-2 border rounded">
        <input type="number" placeholder="Abundancia (%)" class="w-full p-2 mb-4 border rounded">
        <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Procesar</button>
    </div>

    <div id="game-menu" class="hidden bg-gray-900 p-8 rounded-xl shadow-2xl text-white text-center w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-orange-500">Panel Secreto 🦊</h1>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="window.location.href='https://www.google.com/search?q=pokemon+emulator+online'" class="bg-blue-600 py-3 rounded-lg font-bold">🎮 Pokémon</button>
            <button onclick="window.location.href='https://precisionclient.pro/'" class="bg-green-600 py-3 rounded-lg font-bold">⛏️ Minecraft (Eaglercraft)</button>
            <button onclick="window.location.href='https://supermario-game.com/'" class="bg-red-600 py-3 rounded-lg font-bold">🍄 Super Mario</button>
        </div>
        <p class="mt-6 text-gray-400 text-sm italic underline">Presiona "Q" para cerrar todo</p>
    </div>

    <script>
        let inputBuffer = "";
        const secretCode = "fox"; // TU CÓDIGO SECRETO

        // ESCUCHAR TECLADO
        document.addEventListener('keydown', (e) => {
            // Cerrar con la tecla Q
            if (e.key.toLowerCase() === 'q') {
                document.getElementById('game-menu').classList.add('hidden');
                document.getElementById('calculator').classList.remove('hidden');
                inputBuffer = "";
                return;
            }

            // Guardar lo que escribes
            inputBuffer += e.key.toLowerCase();
            
            // Si escribes "fox", muestra los juegos
            if (inputBuffer.includes(secretCode)) {
                document.getElementById('calculator').classList.add('hidden');
                document.getElementById('game-menu').classList.remove('hidden');
                inputBuffer = "";
            }

            // Limpiar el buffer si es muy largo
            if (inputBuffer.length > 10) inputBuffer = "";
        });
    </script>
</body>
</html>
