<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Masa Atómica - Ciencias Innova</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; border-top: 5px solid #0056b3; }
        h2 { color: #0056b3; margin-bottom: 20px; font-size: 1.5rem; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #0056b3; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #004494; }
        
        /* Contenedor de juegos (Oculto) */
        #game-win { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Disparador invisible en la esquina */
        .secret-area { position: fixed; bottom: 0; right: 0; width: 20px; height: 20px; cursor: default; opacity: 0; z-index: 10000; }
        
        .nav-games { position: absolute; top: 10px; left: 10px; z-index: 10001; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        .nav-games button { width: auto; padding: 5px 10px; font-size: 12px; background: #444; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Laboratorio de Química</h2>
        <p>Introduce los datos del isótopo para calcular la masa atómica promedio:</p>
        <input type="number" id="m1" placeholder="Masa Isótopo 1 (u)">
        <input type="number" id="a1" placeholder="Abundancia 1 (%)">
        <input type="number" id="m2" placeholder="Masa Isótopo 2 (u)">
        <input type="number" id="a2" placeholder="Abundancia 2 (%)">
        <button onclick="alert('Cálculo enviado al registro del profesor.')">Procesar Datos</button>
        <p style="font-size: 11px; color: #999; margin-top: 15px;">v2.4 - Innova Schools Portal</p>
    </div>

    <div class="secret-area" onclick="activarMenu()"></div>

    <div id="game-win">
        <div class="nav-games">
            <button onclick="cambiarJuego('nintendo')">Nintendo (All)</button>
            <button onclick="cambiarJuego('playstation')">PS1/PS2/PS3</button>
            <button onclick="cerrarTodo()" style="background: #c0392b;">CERRAR (ESC)</button>
        </div>
        <iframe src="" id="game-frame"></iframe>
    </div>

    <script>
        const frame = document.getElementById('game-frame');
        const win = document.getElementById('game-win');

        function activarMenu() {
            win.style.display = 'block';
            document.title = "Google Drive - Mis Archivos"; // Camuflaje de pestaña
            cambiarJuego('nintendo'); // Carga Nintendo por defecto
        }

        function cambiarJuego(tipo) {
            if(tipo === 'nintendo') {
                // Link a colección de Nintendo en un sitio de emulación estable
                frame.src = "https://www.retrogames.cc/search.html?keyword=nintendo";
            } else if(tipo === 'playstation') {
                // Link a colección de PlayStation
                frame.src = "https://www.retrogames.cc/search.html?keyword=playstation";
            }
        }

        function cerrarTodo() {
            win.style.display = 'none';
            frame.src = "";
            document.title = "Calculadora de Masa Atómica - Ciencias Innova";
        }

        // Pánico total: tecla Escape para ocultar todo si viene el profe
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') cerrarTodo();
        });
    </script>
</body>
</html>
