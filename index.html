<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Masa Atómica - Ciencias</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #eef2f3; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; }
        #game-win { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        iframe { width: 100%; height: 100%; border: none; }
        .secret { position: fixed; bottom: 2px; right: 2px; width: 10px; height: 10px; cursor: pointer; opacity: 0.05; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Laboratorio de Isótopos</h2>
        <p>Calcula la masa atómica promedio para el informe:</p>
        <input type="number" placeholder="Masa atómica">
        <input type="number" placeholder="Abundancia %">
        <br>
        <button onclick="alert('Datos guardados.')">Procesar</button>
    </div>

    <div class="secret" onclick="show()"></div>

    <div id="game-win">
        <iframe src="https://games.poki.com" id="f"></iframe>
    </div>

    <script>
        function show() {
            document.getElementById('game-win').style.display = 'block';
            document.title = "Google Drive"; 
        }
        window.onkeydown = function(e) {
            if (e.key === "Escape") {
                document.getElementById('game-win').style.display = 'none';
                document.title = "Calculadora de Masa Atómica - Ciencias";
            }
        };
    </script>
</body>
</html>
